<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ตะลุยโลกเปอร์เซ็นต์ 🛒</title>
<style>
:root{
  --pink:#ff5d8f; --pink2:#ff8fab; --purple:#9b5de5; --blue:#4cc9f0;
  --green:#06d6a0; --yellow:#ffd60a; --orange:#ff924c; --red:#ef476f;
  --dark:#2b2d42; --paper:#fff;
  --bg1:#ffe3ec; --bg2:#e7d6ff; --bg3:#d6f0ff;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Trebuchet MS','Segoe UI',system-ui,sans-serif;
  background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
  background-size:400% 400%; animation:bg 18s ease infinite;
  min-height:100vh; color:var(--dark); overflow-x:hidden;
}
@keyframes bg{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}
.wrap{max-width:560px;margin:0 auto;padding:16px;min-height:100vh;display:flex;flex-direction:column}
.screen{display:none;animation:fade .35s ease}
.screen.active{display:flex;flex-direction:column;flex:1}
@keyframes fade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.card{background:var(--paper);border-radius:24px;padding:24px;box-shadow:0 12px 30px rgba(155,93,229,.18);border:3px solid #fff}
h1{font-size:1.9rem;text-align:center;background:linear-gradient(90deg,var(--pink),var(--purple));-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1.2}
h2{font-size:1.4rem;color:var(--purple);text-align:center;margin-bottom:6px}
.sub{text-align:center;color:#8a8aa3;font-size:.95rem;margin-bottom:18px}
.btn{display:block;width:100%;padding:16px;border:none;border-radius:18px;font-size:1.1rem;font-weight:bold;cursor:pointer;margin-top:12px;font-family:inherit;transition:transform .12s,box-shadow .12s;color:#fff}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(90deg,var(--pink),var(--purple));box-shadow:0 8px 18px rgba(255,93,143,.4)}
.btn-green{background:linear-gradient(90deg,var(--green),var(--blue));box-shadow:0 8px 18px rgba(6,214,160,.4)}
.btn-yellow{background:linear-gradient(90deg,var(--yellow),var(--orange));color:var(--dark);box-shadow:0 8px 18px rgba(255,146,76,.4)}
.btn-ghost{background:#f0f0fa;color:var(--purple);box-shadow:none}
.btn:disabled{opacity:.5;cursor:not-allowed;filter:grayscale(.6)}
.input{width:100%;padding:14px;border:2px solid #e7d6ff;border-radius:14px;font-size:1.05rem;margin-top:8px;font-family:inherit;outline:none}
.input:focus{border-color:var(--purple)}
label{font-weight:bold;color:var(--dark);font-size:.95rem;display:block;margin-top:14px}
.center-vert{justify-content:center}
.logo{font-size:4rem;text-align:center;animation:bounce 2s ease infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.player-bar{display:flex;align-items:center;gap:8px;background:#fff;border-radius:16px;padding:8px 14px;margin-bottom:14px;box-shadow:0 4px 12px rgba(0,0,0,.06);font-weight:bold}
.player-bar .name{flex:1;color:var(--purple)}
.player-bar .pts{background:var(--yellow);color:var(--dark);padding:3px 10px;border-radius:20px;font-size:.9rem}
.chapter{background:#fff;border-radius:20px;padding:18px;margin-bottom:14px;display:flex;align-items:center;gap:14px;cursor:pointer;box-shadow:0 6px 16px rgba(0,0,0,.08);border:3px solid transparent;transition:transform .15s,border-color .15s;position:relative;overflow:hidden}
.chapter:active{transform:scale(.98)}
.chapter.locked{opacity:.55;cursor:not-allowed}
.chapter.done{border-color:var(--green)}
.chapter .ico{font-size:2.4rem;min-width:54px;height:54px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--bg2),var(--bg3));border-radius:16px}
.chapter .meta{flex:1}
.chapter .tag{font-size:.7rem;color:#aaa;font-weight:bold;letter-spacing:1px}
.chapter .ttl{font-size:1.15rem;font-weight:bold;color:var(--dark)}
.chapter .desc{font-size:.85rem;color:#8a8aa3}
.chapter .lock-badge{position:absolute;top:8px;right:10px;font-size:1.2rem}
.chapter .check{position:absolute;top:8px;right:10px;font-size:1.3rem}
.stage-list{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px}
.stage-btn{background:#fff;border-radius:18px;padding:16px;text-align:center;cursor:pointer;box-shadow:0 5px 14px rgba(0,0,0,.08);border:3px solid transparent;transition:transform .15s}
.stage-btn:active{transform:scale(.96)}
.stage-btn.locked{opacity:.5;cursor:not-allowed}
.stage-btn.done{border-color:var(--green);background:#effff8}
.stage-btn .num{font-size:1.5rem;font-weight:bold;color:var(--purple)}
.stage-btn .stars{font-size:1rem;letter-spacing:2px;margin-top:4px}
.stage-btn .plays{font-size:.72rem;color:#aaa;margin-top:4px}
/* quiz */
.q-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.lives{font-size:1.1rem;letter-spacing:2px}
.q-counter{margin-left:auto;font-weight:bold;color:var(--purple);background:#f0f0fa;padding:4px 12px;border-radius:20px;font-size:.85rem}
.timer-track{height:10px;background:#eee;border-radius:10px;overflow:hidden;margin-bottom:6px}
.timer-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--yellow),var(--red));border-radius:10px;transition:width .25s linear}
.combo{text-align:center;font-weight:bold;color:var(--orange);height:20px;font-size:.9rem}
.question{font-size:1.3rem;font-weight:bold;text-align:center;margin:18px 0;min-height:60px;display:flex;align-items:center;justify-content:center;line-height:1.4}
.opts{display:grid;gap:12px}
.opt{padding:16px;border:3px solid #e7d6ff;border-radius:16px;background:#fff;font-size:1.1rem;font-weight:bold;cursor:pointer;text-align:center;transition:all .15s;font-family:inherit;color:var(--dark)}
.opt:active{transform:scale(.97)}
.opt.correct{background:var(--green);color:#fff;border-color:var(--green);animation:pop .4s}
.opt.wrong{background:var(--red);color:#fff;border-color:var(--red);animation:shake .4s}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
.score-pill{position:absolute;top:18px;right:18px;background:var(--yellow);padding:6px 14px;border-radius:20px;font-weight:bold;color:var(--dark)}
/* result */
.result-ico{font-size:4.5rem;text-align:center}
.result-score{font-size:2.6rem;font-weight:bold;text-align:center;color:var(--purple);margin:8px 0}
.result-stars{font-size:2.2rem;text-align:center;letter-spacing:6px;margin-bottom:8px}
/* teacher table */
.table-wrap{overflow-x:auto;border-radius:14px;border:2px solid #e7d6ff;margin-top:12px}
table{border-collapse:collapse;width:100%;font-size:.82rem;background:#fff;min-width:760px}
th,td{padding:9px 8px;text-align:center;border-bottom:1px solid #f0f0fa;white-space:nowrap}
th{background:linear-gradient(90deg,var(--purple),var(--pink));color:#fff;position:sticky;top:0}
tr:nth-child(even){background:#faf7ff}
.up{color:var(--green);font-weight:bold}
.down{color:var(--red);font-weight:bold}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.toolbar .btn{margin-top:0;width:auto;flex:1;padding:11px;font-size:.9rem;min-width:120px}
.warn-box{background:#fff7e6;border:2px solid var(--yellow);border-radius:14px;padding:14px;font-size:.92rem;line-height:1.7;margin:12px 0}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--dark);color:#fff;padding:12px 22px;border-radius:30px;font-weight:bold;z-index:999;opacity:0;transition:all .35s;max-width:90%;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.tabs{display:flex;gap:8px;margin-bottom:14px}
.tab{flex:1;padding:10px;text-align:center;border-radius:12px;background:#f0f0fa;font-weight:bold;cursor:pointer;color:#8a8aa3}
.tab.active{background:linear-gradient(90deg,var(--pink),var(--purple));color:#fff}
.tab-content{display:none}.tab-content.active{display:block}
.step{display:flex;gap:12px;margin-bottom:14px;align-items:flex-start}
.step .n{min-width:30px;height:30px;background:var(--purple);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold}
.step .t b{color:var(--dark)}.step .t{font-size:.92rem;color:#666;line-height:1.5}
.conn-status{padding:8px 14px;border-radius:12px;font-size:.85rem;font-weight:bold;text-align:center;margin-bottom:12px}
.conn-ok{background:#e6fff5;color:var(--green);border:2px solid var(--green)}
.conn-bad{background:#ffe6ec;color:var(--red);border:2px solid var(--red)}
.conn-load{background:#fff7e6;color:var(--orange);border:2px solid var(--orange)}
.spinner{display:inline-block;width:16px;height:16px;border:3px solid #eee;border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.foot{text-align:center;font-size:.78rem;color:#a0a0b8;margin-top:18px}
.mini{font-size:.8rem;color:#8a8aa3}
.progress-dots{display:flex;justify-content:center;gap:6px;margin:10px 0}
.dot{width:10px;height:10px;border-radius:50%;background:#ddd}
.dot.on{background:var(--green)}
.flash{position:fixed;inset:0;display:none;align-items:center;justify-content:center;font-size:6rem;z-index:500;pointer-events:none}
.flash.show{display:flex;animation:fp .6s ease}
@keyframes fp{0%{transform:scale(.3);opacity:0}40%{transform:scale(1.1);opacity:1}100%{transform:scale(1);opacity:0}}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<div class="toast" id="toast"></div>
<div class="flash" id="flash"></div>
<script>
/* ============ CONFIG ============ */
const CONFIG = {
  SHEET_URL: "https://script.google.com/macros/s/AKfycbwHOnNlTwotxUUJGXVrUUFF-_sN0sPVWv-BbRBJLKpgm60V-ETy7ZHKyVxndbqPp3tC/exec", // <<< วาง Apps Script Web App URL ที่นี่ (ดูคู่มือ)

        {q:"ขนมมี 100 ชิ้น กินไป 30 ชิ้น เหลือร้อยละเท่าไร?", o:["30%","60%","70%","100%"], a:2},
        {q:"ร้อยละ 200 หมายถึงข้อใด?", o:["2 ใน 100","สองเท่าของทั้งหมด","ครึ่งหนึ่ง","20 ใน 100"], a:1}

// ด่านพิเศษ - รวมโจทย์ยากจากทุกบท
const SPECIAL = [

];

// แบบทดสอบก่อนเรียน 20 ข้อ

  {q:"ร้อยละ 30 เขียนเป็นเศษส่วนได้เท่าไร?", o:["30/10","30/100","3/100","30/1000"], a:1},

/* ============ HELPERS ============ */
function toast(msg, ms=2200){
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(t._tm); t._tm = setTimeout(()=>t.classList.remove('show'), ms);
}
function flash(emoji){
  const f = $('#flash'); f.textContent = emoji; f.classList.remove('show');
  void f.offsetWidth; f.classList.add('show');
  setTimeout(()=>f.classList.remove('show'), 600);
}
function chapterDone(cid){
  const ch = CHAPTERS.find(c=>c.id===cid);
  return ch.stages.every((_,i)=> (S.stars[cid+'-'+i]||0) >= CONFIG.PASS_STAR);
}
function allChaptersDone(){ return CHAPTERS.every(c=>chapterDone(c.id)); }
function playsOf(key){ return S.plays[key]||0; }

/* ============ GOOGLE SHEET SYNC ============ */
// ส่งข้อมูลขึ้น Sheet (เขียนทับ row ของนักเรียนคนนี้)
async function pushToSheet(){
  if(!CONFIG.SHEET_URL){ return {ok:false, reason:'no-url'}; }
  const payload = {
    action:'save',
    name:S.name, room:S.room,
    preScore:S.preScore, postScore:S.postScore,
    preDone:S.preDone, postDone:S.postDone,
    gameScore:S.gameScore,
    plays:JSON.stringify(S.plays),
    stars:JSON.stringify(S.stars),
    best:JSON.stringify(S.best||{}),
    ts:new Date().toISOString()
  };
  try{
    const res = await fetch(CONFIG.SHEET_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'}, // เลี่ยง preflight
      body:JSON.stringify(payload)
    });
    const data = await res.json();
    return {ok:data.ok!==false, data};
  }catch(e){ return {ok:false, reason:e.message}; }
}

// ดึงข้อมูลของนักเรียนคนนี้กลับมา (เพื่อรู้ว่าเล่นด่านไหนไปกี่ครั้งแล้ว ข้ามเครื่อง)
async function pullMyData(){
  if(!CONFIG.SHEET_URL) return null;
  try{
    const url = CONFIG.SHEET_URL + '?action=get&name=' + encodeURIComponent(S.name);
    const res = await fetch(url);
    const data = await res.json();
    if(data && data.found){
      S.preDone = !!data.preDone; S.postDone = !!data.postDone;
      S.preScore = +data.preScore||0; S.postScore = +data.postScore||0;
      S.gameScore = +data.gameScore||0;
      try{ S.plays = JSON.parse(data.plays||'{}'); }catch(e){ S.plays={}; }
      try{ S.stars = JSON.parse(data.stars||'{}'); }catch(e){ S.stars={}; }
      try{ S.best = JSON.parse(data.best||'{}'); }catch(e){ S.best={}; }
      S.loadedFromSheet = true;
    }
    return data;
  }catch(e){ return null; }
}

// ดึงข้อมูลนักเรียน "ทั้งหมด" สำหรับหน้าครู
async function pullAll(){
  if(!CONFIG.SHEET_URL) return {ok:false, reason:'no-url'};
  try{
    const res = await fetch(CONFIG.SHEET_URL + '?action=list');
    const data = await res.json();
    return {ok:true, rows:data.rows||[]};
  }catch(e){ return {ok:false, reason:e.message}; }
}

/* ============ QUIZ ENGINE ============ */
let Q = null;
function buildSet(mode, cid, sid){
  if(mode==='pre') return {label:'แบบทดสอบก่อนเรียน', items:PRE_TEST, lives:99, timed:false, isTest:'pre'};
  if(mode==='post') return {label:'แบบทดสอบหลังเรียน', items:POST_TEST, lives:99, timed:false, isTest:'post'};
  if(mode==='special') return {label:'ด่านพิเศษ: มหกรรมร้อยละ', items:SPECIAL, lives:3, timed:true, cid:'special', sid:0};
  const ch = CHAPTERS.find(c=>c.id===cid);
  return {label:ch.title+' • ด่าน '+(sid+1), items:ch.stages[sid], lives:3, timed:true, cid:cid, sid:sid};
}

function startTest(type){ startQuiz(type, 0); }

function startQuiz(mode, sid, cid){
  // mode = 'pre' | 'post' | 'special' | <number cid>
  let setup;
  if(mode==='pre'||mode==='post'){ setup = buildSet(mode); }
  else if(mode==='special'){ setup = buildSet('special'); }
  else { setup = buildSet('chapter', mode, sid); }

  Q = {
    set:setup, idx:0, correct:0, score:0, combo:0,
    lives:setup.lives, locked:false, timer:null, timeLeft:0
  };
  renderQ();
}

function renderQ(){
  const set = Q.set, item = set.items[Q.idx];
  const isTest = set.isTest;
  const total = set.items.length;
  let livesHtml = isTest ? '' : '❤️'.repeat(Math.max(0,Q.lives))+'🖤'.repeat(Math.max(0,set.lives-Q.lives));
  show(`
    <div class="screen active">
      <div class="card" style="position:relative">
        ${isTest?'':`<div class="score-pill">⭐ ${Q.score}</div>`}
        <div class="q-top">
          ${isTest?'':`<span class="lives">${livesHtml}</span>`}
          <span class="q-counter">ข้อ ${Q.idx+1} / ${total}</span>
        </div>
        ${set.timed?`<div class="timer-track"><div class="timer-fill" id="tfill" style="width:100%"></div></div>`:''}
        <div class="combo" id="combo">${Q.combo>=2?'🔥 COMBO x'+Q.combo:''}</div>
        <div class="tag" style="text-align:center;color:#aaa">${set.label}</div>
        <div class="question">${item.q}</div>
        <div class="opts" id="opts">
          ${item.o.map((o,i)=>`<button class="opt" data-i="${i}" onclick="answer(${i})">${o}</button>`).join('')}
        </div>
      </div>
    </div>`);
  if(set.timed) startTimer();
}

function startTimer(){
  Q.timeLeft = 100;
  const fill = $('#tfill');
  clearInterval(Q.timer);
  Q.timer = setInterval(()=>{
    Q.timeLeft -= 2.5; // ~10 วินาที
    if(fill) fill.style.width = Math.max(0,Q.timeLeft)+'%';
    if(Q.timeLeft<=0){ clearInterval(Q.timer); timeout(); }
  }, 250);
}
function timeout(){
  if(Q.locked) return;
  Q.locked = true;
  const item = Q.set.items[Q.idx];
  document.querySelectorAll('.opt').forEach(b=>{
    if(+b.dataset.i===item.a) b.classList.add('correct');
  });
  Q.combo = 0;
  if(!Q.set.isTest){ Q.lives--; flash('⏰'); toast('หมดเวลา! ⏰'); }
  setTimeout(nextQ, 1100);
}

function answer(i){
  if(Q.locked) return;
  Q.locked = true;
  clearInterval(Q.timer);
  const item = Q.set.items[Q.idx];
  const correct = i===item.a;
  document.querySelectorAll('.opt').forEach(b=>{
    const bi = +b.dataset.i;
    if(bi===item.a) b.classList.add('correct');
    else if(bi===i) b.classList.add('wrong');
  });
  if(correct){
    Q.correct++;
    if(Q.set.timed){
      Q.combo++;
      const timeBonus = Math.round(Q.timeLeft/10);
      const comboBonus = Q.combo>=2 ? Q.combo*2 : 0;
      Q.score += 10 + timeBonus + comboBonus;
    } else { Q.score += 1; }
    flash(Q.combo>=3?'🔥':'🎉');
  } else {
    Q.combo = 0;
    if(!Q.set.isTest){ Q.lives--; }
    flash('💔');
  }
  setTimeout(nextQ, 1000);
}

function nextQ(){
  Q.locked = false;
  // เกมแพ้ (หมดชีวิต)
  if(!Q.set.isTest && Q.lives<=0){ return finishStage(false); }
  Q.idx++;
  if(Q.idx>=Q.set.items.length){
    if(Q.set.isTest) return finishTest();
    return finishStage(true);
  }
  renderQ();
}

/* ---- Finish a chapter stage ---- */
async function finishStage(cleared){
  clearInterval(Q.timer);
  const set = Q.set;
  const pct = Q.correct/set.items.length;
  let star = 0;
  if(cleared){ star = pct>=1?3 : pct>=0.6?2 : 1; }
  const key = (set.cid==='special'?'special':set.cid)+'-'+(set.sid||0);
  // นับจำนวนครั้งที่เล่น (เฉพาะด่านบทเรียน ไม่นับ special)
  if(set.cid!=='special'){
    S.plays[key] = playsOf(key)+1;
    S.stars[key] = Math.max(S.stars[key]||0, star);
  }
  // อัปเดตคะแนนเกมรวม (เก็บดีที่สุด)
  S.gameScore = Math.max(S.gameScore, S.gameScore); // คงไว้
  // คะแนนเกมรวม = ผลรวมคะแนนดาวทุกด่าน *แบบสะสมคะแนนดิบ
  recomputeGameScore(Q.score, key, set.cid);

  // ส่งขึ้น Sheet
  let synced = false;
  if(CONFIG.SHEET_URL){ const r = await pushToSheet(); synced = r.ok; }

  const playsLeft = set.cid!=='special' ? (CONFIG.MAX_PLAYS - playsOf(key)) : '∞';
  show(`
    <div class="screen active center-vert">
      <div class="card" style="text-align:center">
        <div class="result-ico">${cleared?(star===3?'🏆':star===2?'🥈':'🥉'):'💔'}</div>
        <h2>${cleared?'ยอดเยี่ยม!':'เสียใจด้วย หมดชีวิตแล้ว'}</h2>
        <div class="result-stars">${'⭐'.repeat(star)}${'☆'.repeat(3-star)}</div>
        <div class="result-score">${Q.score} คะแนน</div>
        <p class="sub">ตอบถูก ${Q.correct} / ${set.items.length} ข้อ</p>
        <p class="mini">${CONFIG.SHEET_URL?(synced?'☁️ บันทึกขึ้นระบบครูแล้ว':'⚠️ บันทึกไม่สำเร็จ ลองใหม่'):'📌 ยังไม่ได้เชื่อมระบบครู'}</p>
        ${set.cid!=='special'?`<p class="mini">เหลือสิทธิ์เล่นด่านนี้อีก ${playsLeft} ครั้ง</p>`:''}
        <button class="btn btn-primary" onclick="${set.cid==='special'?'screenMap()':`screenStages(${set.cid})`}">ไปต่อ →</button>
        <button class="btn btn-ghost" onclick="screenMap()">🏠 หน้าหลัก</button>
      </div>
    </div>`);
}

function recomputeGameScore(thisScore, key, cid){
  // เก็บคะแนนดิบที่ดีที่สุดต่อด่าน ลงใน S.best แล้วรวมเป็นคะแนนเกม
  if(!S.best) S.best = {};
  S.best[key] = Math.max(S.best[key]||0, thisScore);
  S.gameScore = Object.values(S.best).reduce((a,b)=>a+b,0);
}

/* ---- Finish a pre/post test ---- */
async function finishTest(){
  const set = Q.set;
  const score = Q.correct;
  if(set.isTest==='pre'){ S.preDone=true; S.preScore=score; }
  else { S.postDone=true; S.postScore=score; }
  let synced=false;
  if(CONFIG.SHEET_URL){ const r=await pushToSheet(); synced=r.ok; }
  const isPre = set.isTest==='pre';
  show(`
    <div class="screen active center-vert">
      <div class="card" style="text-align:center">
        <div class="result-ico">${isPre?'📝':'🎓'}</div>
        <h2>ทำแบบทดสอบ${isPre?'ก่อนเรียน':'หลังเรียน'}เสร็จแล้ว!</h2>
        <div class="result-score">${score} / 20</div>
        ${!isPre&&S.preDone?`<p class="sub">ก่อนเรียน ${S.preScore} → หลังเรียน ${score} ${score-S.preScore>=0?`<span class="up">▲ +${score-S.preScore}</span>`:`<span class="down">▼ ${score-S.preScore}</span>`}</p>`:''}
        <p class="mini">${CONFIG.SHEET_URL?(synced?'☁️ บันทึกขึ้นระบบครูแล้ว':'⚠️ บันทึกไม่สำเร็จ'):'📌 ยังไม่ได้เชื่อมระบบครู'}</p>
        <p class="sub">${isPre?'พร้อมแล้ว! ปลดล็อกบทที่ 1 ให้แล้ว ไปลุยกันเลย 🎉':'เก่งมาก! เรียนจบครบทุกบทแล้ว 🌟'}</p>
        <button class="btn btn-primary" onclick="screenMap()">${isPre?'ไปเรียนบทที่ 1 →':'🏠 กลับหน้าหลัก'}</button>
      </div>
    </div>`);
}

function switchTab(i){
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',i===j));
  document.querySelectorAll('.tab-content').forEach((t,j)=>t.classList.toggle('active',i===j));
}

/* ---- Teacher ---- */
function screenTeacherLogin(){
  show(`
    <div class="screen active center-vert">
      <div class="card">
        <div style="text-align:center;font-size:3rem">👩‍🏫</div>
        <h2>ระบบครู</h2>
        <p class="sub">ดูรายงานคะแนนนักเรียนทั้งหมด</p>
        <label>รหัส PIN ครู (4 หลัก)</label>
        <input class="input" id="pin" type="tel" maxlength="4" placeholder="••••" style="text-align:center;letter-spacing:8px;font-size:1.4rem">
        <button class="btn btn-primary" id="btnPin">🔐 เข้าสู่ระบบ</button>
        <button class="btn btn-ghost" onclick="screenWelcome()">← กลับ</button>

  };
  $('#pin').addEventListener('keyup',e=>{if(e.key==='Enter')$('#btnPin').click();});
}

async function screenTeacherDash(){
  show(`<div class="screen active"><div class="card">
    <h2>📊 รายงานคะแนนนักเรียน</h2>
    <div class="conn-status conn-load" id="connStat"><span class="spinner"></span> กำลังโหลดข้อมูลจาก Google Sheet...</div>
    <div id="tableArea"></div>
    <div class="toolbar">
      <button class="btn btn-green" onclick="screenTeacherDash()">🔄 รีเฟรช</button>
      <button class="btn btn-yellow" onclick="exportCSV()">⬇️ Export CSV</button>
    </div>
    <button class="btn btn-ghost" onclick="screenWelcome()">← ออก</button>
    <p class="foot">PIN ครู: ${CONFIG.TEACHER_PIN}</p>
  </div></div>`);

  if(!CONFIG.SHEET_URL){
    $('#connStat').className='conn-status conn-bad';
    $('#connStat').innerHTML='❌ ยังไม่ได้เชื่อม Google Sheet — ครูต้องวาง URL ในไฟล์เกมก่อน (ดูคู่มือติดตั้ง)';
    return;
  }
  const res = await pullAll();
  if(!res.ok){
    $('#connStat').className='conn-status conn-bad';
    $('#connStat').innerHTML='❌ เชื่อมต่อไม่สำเร็จ: '+(res.reason||'')+' — ตรวจอินเทอร์เน็ตและ URL';
    return;
  }
  window._rows = res.rows;
  $('#connStat').className='conn-status conn-ok';
  $('#connStat').innerHTML='✅ เชื่อมต่อสำเร็จ • นักเรียน '+res.rows.length+' คน • อัปเดต '+new Date().toLocaleTimeString('th-TH');
  renderTeacherTable(res.rows);
}

function progressOf(stars){
  let done=0;
  CHAPTERS.forEach(c=>{ if(c.stages.every((_,i)=>(stars[c.id+'-'+i]||0)>=CONFIG.PASS_STAR)) done++; });
  return done;
}
function stagesPassed(stars){
  let p=0; CHAPTERS.forEach(c=>c.stages.forEach((_,i)=>{ if((stars[c.id+'-'+i]||0)>=CONFIG.PASS_STAR)p++; }));
  return p;
}

function renderTeacherTable(rows){
  if(!rows.length){ $('#tableArea').innerHTML='<p class="sub" style="margin-top:20px">ยังไม่มีนักเรียนเล่น</p>'; return; }
  let body = rows.map((r,idx)=>{
    let stars={}; try{stars=JSON.parse(r.stars||'{}');}catch(e){}
    const dev = (r.postDone&&r.preDone)?(+r.postScore - +r.preScore):null;
    const totalStages = CHAPTERS.reduce((a,c)=>a+c.stages.length,0);
    return `<tr>
      <td>${idx+1}</td>
      <td style="text-align:left;font-weight:bold">${esc(r.name)}</td>
      <td>${esc(r.room||'-')}</td>
      <td>${r.preDone?r.preScore:'-'}</td>
      <td>${r.postDone?r.postScore:'-'}</td>
      <td>${dev===null?'-':(dev>=0?`<span class="up">▲ +${dev}</span>`:`<span class="down">▼ ${dev}</span>`)}</td>
      <td><b>${r.gameScore||0}</b></td>
      <td>${progressOf(stars)}/4 บท</td>
      <td>${stagesPassed(stars)}/${totalStages}</td>
      <td>${r.ts?new Date(r.ts).toLocaleString('th-TH',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'-'}</td>
    </tr>`;
  }).join('');
  $('#tableArea').innerHTML = `<div class="table-wrap"><table>
    <thead><tr><th>#</th><th>ชื่อนักเรียน</th><th>ห้อง</th><th>ก่อนเรียน</th><th>หลังเรียน</th><th>พัฒนา</th><th>คะแนนเกม</th><th>ความก้าวหน้า</th><th>ด่านผ่าน</th><th>เล่นล่าสุด</th></tr></thead>
    <tbody>${body}</tbody></table></div>`;
}
function esc(s){ return String(s||'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])); }

function exportCSV(){
  const rows = window._rows||[];
  if(!rows.length){ toast('ไม่มีข้อมูลให้ export'); return; }
  let csv = '\uFEFFลำดับ,ชื่อนักเรียน,ห้อง,ก่อนเรียน,หลังเรียน,พัฒนา,คะแนนเกม,ความก้าวหน้า(บท),เล่นล่าสุด\n';
  rows.forEach((r,i)=>{
    let stars={}; try{stars=JSON.parse(r.stars||'{}');}catch(e){}
    const dev=(r.postDone&&r.preDone)?(+r.postScore-+r.preScore):'';
    csv += [i+1, '"'+(r.name||'')+'"', '"'+(r.room||'')+'"', r.preDone?r.preScore:'', r.postDone?r.postScore:'', dev, r.gameScore||0, progressOf(stars)+'/4', r.ts?new Date(r.ts).toLocaleString('th-TH'):''].join(',')+'\n';
  });
  const blob = new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'คะแนนนักเรียน_'+new Date().toLocaleDateString('th-TH')+'.csv';
  a.click();
  toast('⬇️ ดาวน์โหลด CSV แล้ว');
}
